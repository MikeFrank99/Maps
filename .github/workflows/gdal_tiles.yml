name: Generate Map Tiles
on:
  push:
    paths:
      - 'input_maps/**'
permissions:
  contents: write

jobs:
  build-tiles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install GDAL
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin python3-gdal

      - name: Generate Tiles, Sync and Map List
        run: |
          shopt -s nullglob
          
          # Inizializziamo le variabili per la gestione della lista
          current_maps_string=""
          json_list="["
          
          # 1. Processiamo ogni immagine nella cartella input_maps
          for img in input_maps/*.{webp,png,jpg,jpeg}; do
            # Estraiamo il nome senza estensione
            name=$(basename "$img" | sed -E 's/\.(webp|png|jpg|jpeg)$//')
            
            # Costruiamo la stringa per il confronto e il JSON per il sito web
            current_maps_string="$current_maps_string $name "
            if [ "$json_list" != "[" ]; then json_list+=","; fi
            json_list+="\"$name\""
            
            echo "--- Elaborazione mappa: $name ---"
            mkdir -p "$name"
            
            # Comando GDAL: -z 0-5 definisce lo zoom (puoi aumentarlo a 0-6 se necessario)
            gdal2tiles.py -p raster --xyz -z 0-5 -w none "$img" "$name"
          done
          
          json_list+="]"
          
          # 2. Salviamo il file JSON che il tuo index.html userà per il selettore
          echo "$json_list" > map_list.json
          echo "Lista mappe aggiornata: $json_list"

          # 3. Pulizia cartelle obsolete
          # Rimuove le directory dei tasselli se il file sorgente non esiste più
          for dir in */; do
            dir=${dir%/}
            # Proteggiamo cartelle di sistema e la cartella di input
            if [ "$dir" != "input_maps" ] && [[ ! "$dir" =~ ^\. ]]; then
              if [[ ! " $current_maps_string " =~ " $name " ]]; then
                # Nota: qui confrontiamo il nome della cartella con la stringa dei file validi
                if [[ ! " $current_maps_string " =~ " $dir " ]]; then
                   echo "Rimozione cartella obsoleta: $dir"
                   rm -rf "$dir"
                fi
              fi
            fi
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # Il comando esegue il commit e il push solo se ci sono modifiche effettive
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-sync tiles and map list" && git push)
