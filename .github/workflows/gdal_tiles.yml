name: Generate Map Tiles
on:
  push:
    paths:
      - 'input_maps/**'
permissions:
  contents: write

jobs:
  build-tiles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install GDAL
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin python3-gdal

      - name: Generate Tiles and Sync
        run: |
          # Abilita il riconoscimento di pattern estesi
          shopt -s nullglob
          
          # 1. Crea lista dei nomi file senza estensione per la pulizia
          current_maps=""
          for img in input_maps/*.{webp,png,jpg,jpeg}; do
            name=$(basename "$img" | sed -E 's/\.(webp|png|jpg|jpeg)$//')
            current_maps="$current_maps $name "
          done
          
          # 2. Genera tasselli per ogni immagine
          for img in input_maps/*.{webp,png,jpg,jpeg}; do
            folder_name=$(basename "$img" | sed -E 's/\.(webp|png|jpg|jpeg)$//')
            echo "Elaborazione mappa: $folder_name"
            mkdir -p "$folder_name"
            # Generiamo i tile (output sempre .png per compatibilità)
            gdal2tiles.py -p raster --xyz -z 0-5 -w none "$img" "$folder_name"
          done

          # 3. Pulizia cartelle obsolete (rimuove cartelle che non hanno più un file in input_maps)
          for dir in */; do
            dir=${dir%/}
            # Salta cartelle di sistema e input_maps
            if [ "$dir" != "input_maps" ] && [[ ! "$dir" =~ ^\. ]]; then
              if [[ ! " $current_maps " =~ " $dir " ]]; then
                echo "Rimozoione cartella obsoleta: $dir"
                rm -rf "$dir"
              fi
            fi
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-sync tiles (multi-format)" && git push)
