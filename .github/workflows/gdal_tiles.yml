name: Generate Map Tiles
on:
  push:
    paths:
      - 'input_maps/**'
permissions: # AGGIUNTO: Permessi espliciti per scrivere nella repo
  contents: write

jobs:
  build-tiles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # AGGIUNTO: Token per il push

      - name: Install GDAL
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin python3-gdal

      - name: Generate Tiles and Sync
        run: |
          current_maps=$(ls input_maps/*.webp 2>/dev/null | xargs -n 1 basename -s .webp || echo "")
          
          for img in input_maps/*.webp; do
            [ -e "$img" ] || continue
            folder_name=$(basename "$img" .webp)
            mkdir -p "$folder_name"
            gdal2tiles.py -p raster --xyz -z 0-5 -w none "$img" "$folder_name"
          done

          for dir in */; do
            dir=${dir%/}
            if [ "$dir" != "input_maps" ] && [[ ! "$dir" =~ ^\. ]]; then
              if [[ ! " $current_maps " =~ " $dir " ]]; then
                rm -rf "$dir"
              fi
            fi
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # Evita errore se non ci sono cambiamenti
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-sync tiles" && git push)
