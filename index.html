<!DOCTYPE html>
<html>
<head>
    <title>Fantasy Maps Gallery</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #1a1a1a; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        #ui {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; color: white;
        }
        select { background: #333; color: white; border: 1px solid #555; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">
        <label>Scegli Mappa: </label>
        <select id="mapSelector" onchange="loadMap(this.value)"></select>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([0, 0], 2);
        var currentLayer;

        function loadMap(folder) {
            if (currentLayer) map.removeLayer(currentLayer);
            
            currentLayer = L.tileLayer('./' + folder + '/{z}/{x}/{y}.png', {
                minZoom: 0, maxZoom: 5, noWrap: true
            }).addTo(map);
            
            map.setView([0, 0], 2);
        }

        // Carica automaticamente l'elenco delle mappe
        fetch('./map_list.json')
            .then(response => response.json())
            .then(maps => {
                const selector = document.getElementById('mapSelector');
                maps.forEach(m => {
                    let opt = document.createElement('option');
                    opt.value = m;
                    opt.innerHTML = m;
                    selector.appendChild(opt);
                });
                if(maps.length > 0) loadMap(maps[0]);
            })
            .catch(err => console.error("Errore nel caricamento lista mappe:", err));
    </script>
</body>
</html>
